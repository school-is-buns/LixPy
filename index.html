<script type="text/python">
from browser import document, window
import re
import time as _time

# ─────────────────────────────────────────────
#  IN-MEMORY FILESYSTEM
# ─────────────────────────────────────────────
# Each node: {"type":"dir"|"file"|"link", "mode":int, "owner":str,
#             "group":str, "mtime":float, "content":str|None,
#             "target":str|None, "children":dict|None}

def _now():
    return _time.time()

def make_dir(owner="root", group="root", mode=0o755):
    return {"type":"dir","mode":mode,"owner":owner,"group":group,
            "mtime":_now(),"content":None,"target":None,"children":{}}

def make_file(content="", owner="root", group="root", mode=0o644):
    return {"type":"file","mode":mode,"owner":owner,"group":group,
            "mtime":_now(),"content":content,"target":None,"children":None}

def make_link(target, owner="root", group="root"):
    return {"type":"link","mode":0o777,"owner":owner,"group":group,
            "mtime":_now(),"content":None,"target":target,"children":None}

# Build the initial filesystem tree
FS = make_dir()

def fs_mkdir(path_parts, tree=None, **kw):
    node = tree if tree else FS
    for p in path_parts:
        if p not in node["children"]:
            node["children"][p] = make_dir(**kw)
        node = node["children"][p]
    return node

def _init_fs():
    r = FS["children"]
    # /bin /sbin /usr /lib /lib64 /etc /home /root /tmp /var /proc /dev /opt /srv /mnt /media /run /sys
    for d in ["bin","sbin","usr","lib","lib64","etc","home","root","tmp","var",
              "proc","dev","opt","srv","mnt","media","run","sys","boot"]:
        r[d] = make_dir()

    # /usr subtree
    r["usr"]["children"]["bin"]   = make_dir()
    r["usr"]["children"]["sbin"]  = make_dir()
    r["usr"]["children"]["lib"]   = make_dir()
    r["usr"]["children"]["share"] = make_dir()
    r["usr"]["children"]["local"] = make_dir()
    r["usr"]["children"]["local"]["children"]["bin"]  = make_dir()
    r["usr"]["children"]["local"]["children"]["lib"]  = make_dir()
    r["usr"]["children"]["local"]["children"]["share"]= make_dir()
    r["usr"]["children"]["share"]["children"]["man"]  = make_dir()
    r["usr"]["children"]["share"]["children"]["doc"]  = make_dir()

    # /var subtree
    r["var"]["children"]["log"]  = make_dir()
    r["var"]["children"]["tmp"]  = make_dir(mode=0o1777)
    r["var"]["children"]["run"]  = make_dir()
    r["var"]["children"]["lib"]  = make_dir()
    r["var"]["children"]["cache"]= make_dir()
    r["var"]["children"]["spool"]= make_dir()
    r["var"]["children"]["log"]["children"]["syslog"] = make_file(
        "Jun 12 00:00:01 linux kernel: Linux version 6.1.0-emulated\n"
        "Jun 12 00:00:01 linux kernel: Command line: BOOT_IMAGE=/vmlinuz\n"
        "Jun 12 00:00:02 linux systemd[1]: Started Linux Emulator.\n")

    # /etc files
    r["etc"]["children"]["passwd"] = make_file(
        "root:x:0:0:root:/root:/bin/bash\n"
        "daemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin\n"
        "user:x:1000:1000:User,,,:/home/user:/bin/bash\n")
    r["etc"]["children"]["group"] = make_file(
        "root:x:0:\ndaemon:x:1:\nsudo:x:27:user\nuser:x:1000:\n")
    r["etc"]["children"]["hostname"] = make_file("linux-emulator\n")
    r["etc"]["children"]["hosts"] = make_file(
        "127.0.0.1\tlocalhost\n127.0.1.1\tlinux-emulator\n::1\tlocalhost\n")
    r["etc"]["children"]["fstab"] = make_file(
        "# /etc/fstab\n"
        "proc\t/proc\tproc\tdefaults\t0 0\nsysfs\t/sys\tsysfs\tdefaults\t0 0\n"
        "tmpfs\t/tmp\ttmpfs\tdefaults\t0 0\n")
    r["etc"]["children"]["os-release"] = make_file(
        'NAME="LinuxEmulator"\nVERSION="1.0"\nID=linux-emulator\n'
        'PRETTY_NAME="Linux Emulator 1.0"\nVERSION_ID="1.0"\n'
        'HOME_URL="https://claude.ai"\n')
    r["etc"]["children"]["shells"] = make_file(
        "/bin/sh\n/bin/bash\n/bin/dash\n/usr/bin/zsh\n")
    r["etc"]["children"]["motd"] = make_file(
        "Welcome to Linux Emulator — running in Brython!\n"
        "Type 'help' for available commands.\n")
    r["etc"]["children"]["profile"] = make_file(
        "# /etc/profile\nexport PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin\n")
    r["etc"]["children"]["resolv.conf"] = make_file("nameserver 8.8.8.8\nnameserver 8.8.4.4\n")
    r["etc"]["children"]["issue"] = make_file("Linux Emulator 1.0 \\n \\l\n")
    r["etc"]["children"]["crontab"] = make_file("# m h dom mon dow command\n")

    # /proc virtual files
    r["proc"]["children"]["version"]    = make_file("Linux version 6.1.0-emulated (gcc 12.2.0) #1 SMP")
    r["proc"]["children"]["uptime"]     = make_file("3600.00 7200.00")
    r["proc"]["children"]["meminfo"]    = make_file(
        "MemTotal:       8192000 kB\nMemFree:        4096000 kB\n"
        "MemAvailable:   5120000 kB\nBuffers:         512000 kB\n"
        "Cached:         1024000 kB\nSwapTotal:      2048000 kB\nSwapFree:       2048000 kB\n")
    r["proc"]["children"]["cpuinfo"]    = make_file(
        "processor\t: 0\nvendor_id\t: BrythonVM\nmodel name\t: Virtual CPU @ 2.00GHz\n"
        "cpu MHz\t\t: 2000.000\ncache size\t: 256 KB\n")
    r["proc"]["children"]["loadavg"]    = make_file("0.00 0.01 0.05 1/42 1337")
    r["proc"]["children"]["mounts"]     = make_file(
        "proc /proc proc rw 0 0\nsysfs /sys sysfs rw 0 0\ntmpfs /tmp tmpfs rw 0 0\n"
        "devtmpfs /dev devtmpfs rw 0 0\n")
    r["proc"]["children"]["self"]       = make_dir()
    r["proc"]["children"]["self"]["children"]["status"] = make_file(
        "Name:\tbash\nPid:\t1\nPPid:\t0\nUid:\t1000\nGid:\t1000\n")

    # /dev
    r["dev"]["children"]["null"]  = make_file("")
    r["dev"]["children"]["zero"]  = make_file("")
    r["dev"]["children"]["random"]= make_file("")
    r["dev"]["children"]["tty"]   = make_file("")
    r["dev"]["children"]["sda"]   = make_file("")
    r["dev"]["children"]["sda1"]  = make_file("")

    # /home/user
    r["home"]["children"]["user"] = make_dir(owner="user", group="user", mode=0o755)
    hu = r["home"]["children"]["user"]["children"]
    hu["Desktop"]   = make_dir(owner="user", group="user")
    hu["Documents"] = make_dir(owner="user", group="user")
    hu["Downloads"] = make_dir(owner="user", group="user")
    hu["Pictures"]  = make_dir(owner="user", group="user")
    hu["Videos"]    = make_dir(owner="user", group="user")
    hu["Music"]     = make_dir(owner="user", group="user")
    hu[".bashrc"]   = make_file(
        '# ~/.bashrc\nexport PS1="\\u@\\h:\\w\\$ "\nexport EDITOR=nano\n'
        'alias ll="ls -la"\nalias la="ls -A"\nalias l="ls -CF"\n',
        owner="user", group="user")
    hu[".bash_history"] = make_file("ls\npwd\necho hello\n", owner="user", group="user")
    hu[".profile"] = make_file('# ~/.profile\n. ~/.bashrc\n', owner="user", group="user")
    hu["readme.txt"] = make_file(
        "Welcome to your home directory!\nYou can create, edit and manage files here.\n"
        "Try: ls, cd, cat, mkdir, touch, echo, nano (basic), vi (basic)\n",
        owner="user", group="user")

    # /root
    r["root"]["children"][".bashrc"] = make_file(
        '# /root/.bashrc\nexport PS1="\\u@\\h:\\w# "\n')

    # /tmp (world-writable)
    r["tmp"]["mode"] = 0o1777

    # /boot
    r["boot"]["children"]["vmlinuz"] = make_file("", mode=0o644)
    r["boot"]["children"]["initrd.img"] = make_file("", mode=0o644)
    r["boot"]["children"]["grub"] = make_dir()
    r["boot"]["children"]["grub"]["children"]["grub.cfg"] = make_file(
        "# GRUB configuration\nset default=0\nset timeout=5\n")

    # /opt
    r["opt"]["children"]["emulator"] = make_dir()
    r["opt"]["children"]["emulator"]["children"]["version"] = make_file("1.0.0\n")

    # symlinks
    r["bin"]["children"]["sh"]   = make_link("/bin/bash")
    r["bin"]["children"]["python3"] = make_link("/usr/bin/python3")

_init_fs()

# ─────────────────────────────────────────────
#  STATE
# ─────────────────────────────────────────────
STATE = {
    "cwd": ["home","user"],   # list of path components from root
    "user": "user",
    "hostname": "linux-emulator",
    "env": {
        "HOME": "/home/user",
        "USER": "user",
        "SHELL": "/bin/bash",
        "PATH": "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",
        "TERM": "xterm-256color",
        "LANG": "en_US.UTF-8",
        "PWD":  "/home/user",
        "OLDPWD": "/home/user",
    },
    "history": [],
    "hist_idx": -1,
    "aliases": {
        "ll": "ls -la",
        "la": "ls -A",
        "l":  "ls -CF",
        "dir": "ls",
    },
    "editor_mode": None,   # None | "nano" | "vi"
    "editor_file": None,
    "editor_content": None,
    "vi_mode": "command",  # command | insert
    "running_jobs": [],
}

# ─────────────────────────────────────────────
#  FILESYSTEM HELPERS
# ─────────────────────────────────────────────
def _resolve_path(path_str):
    """Resolve a path string to a list of components (absolute)."""
    if path_str.startswith("/"):
        parts = [p for p in path_str.split("/") if p]
    else:
        parts = STATE["cwd"][:]
        for p in path_str.split("/"):
            if p == "" or p == ".":
                continue
            elif p == "..":
                if parts:
                    parts.pop()
            else:
                parts.append(p)
    return parts

def _get_node(parts, follow_links=True, max_depth=20):
    node = FS
    for i, p in enumerate(parts):
        if node["type"] == "link" and follow_links:
            target = _resolve_path(node["target"])
            node = _get_node(target, follow_links=True)
            if node is None:
                return None
        if node is None or node["type"] != "dir":
            return None
        node = node["children"].get(p)
    if node and node["type"] == "link" and follow_links:
        return _get_node(_resolve_path(node["target"]), follow_links=True)
    return node

def _get_parent_and_name(parts):
    if not parts:
        return None, None
    parent = _get_node(parts[:-1])
    return parent, parts[-1]

def _path_str(parts=None):
    if parts is None:
        parts = STATE["cwd"]
    if not parts:
        return "/"
    return "/" + "/".join(parts)

def _fmt_mode(node):
    t = {"dir":"d","file":"-","link":"l"}.get(node["type"],"-")
    m = node["mode"]
    bits = ""
    for shift in [6,3,0]:
        v = (m >> shift) & 7
        bits += ("r" if v&4 else "-") + ("w" if v&2 else "-") + ("x" if v&1 else "-")
    return t + bits

def _fmt_size(node):
    if node["type"] == "file":
        return str(len(node["content"]))
    return "4096"

def _fmt_time(ts):
    import time as t
    return t.strftime("%b %d %H:%M", t.localtime(ts))

# ─────────────────────────────────────────────
#  OUTPUT HELPERS
# ─────────────────────────────────────────────
def _out(text, cls=""):
    out_div = document["output"]
    if cls:
        out_div.html += f'<span class="line-{cls}">{_esc(text)}</span>\n'
    else:
        out_div.html += _esc(text) + "\n"
    out_div.scrollTop = out_div.scrollHeight

def _out_raw(html):
    document["output"].html += html
    document["output"].scrollTop = document["output"].scrollHeight

def _esc(s):
    return str(s).replace("&","&amp;").replace("<","&lt;").replace(">","&gt;").replace('"','&quot;')

def _echo_cmd(cmd_str):
    p = _get_prompt_str()
    _out_raw(f'<span class="prompt-line">{_esc(p)} {_esc(cmd_str)}</span>\n')

def _get_prompt_str():
    cwd = _path_str()
    home = STATE["env"]["HOME"]
    if cwd.startswith(home):
        cwd = "~" + cwd[len(home):]
    u = STATE["user"]
    h = STATE["hostname"]
    sym = "#" if u == "root" else "$"
    return f"{u}@{h}:{cwd}{sym}"

def _update_prompt():
    document["prompt-label"].text = _get_prompt_str() + "\u00a0"
    document["titletext"].text = f"{STATE['user']}@{STATE['hostname']}: {_path_str()}"

# ─────────────────────────────────────────────
#  TOKENIZER / PARSER
# ─────────────────────────────────────────────
def _expand_vars(s):
    """Expand $VAR and ${VAR}."""
    def repl(m):
        name = m.group(1) or m.group(2)
        return STATE["env"].get(name, "")
    s = re.sub(r'\$\{([^}]+)\}|\$([A-Za-z_][A-Za-z0-9_]*)', repl, s)
    return s

def _tokenize(line):
    """Simple shell tokenizer supporting quotes and $VAR expansion."""
    tokens = []
    i = 0
    current = ""
    while i < len(line):
        c = line[i]
        if c in ('"', "'"):
            quote = c
            i += 1
            while i < len(line) and line[i] != quote:
                if quote == '"' and line[i] == '\\' and i+1 < len(line):
                    i += 1
                    current += line[i]
                else:
                    current += line[i]
                i += 1
            i += 1  # skip closing quote
        elif c == '\\' and i+1 < len(line):
            i += 1
            current += line[i]
            i += 1
        elif c == ' ' or c == '\t':
            if current:
                tokens.append(_expand_vars(current))
                current = ""
            i += 1
        else:
            current += c
            i += 1
    if current:
        tokens.append(_expand_vars(current))
    return tokens

def _parse_redirects(tokens):
    """Extract > >> < from token list. Returns (clean_tokens, redir_dict)."""
    out_tokens = []
    redir = {"stdout": None, "stdout_append": False, "stdin": None}
    i = 0
    while i < len(tokens):
        t = tokens[i]
        if t == ">" and i+1 < len(tokens):
            redir["stdout"] = tokens[i+1]
            redir["stdout_append"] = False
            i += 2
        elif t == ">>" and i+1 < len(tokens):
            redir["stdout"] = tokens[i+1]
            redir["stdout_append"] = True
            i += 2
        elif t == "<" and i+1 < len(tokens):
            redir["stdin"] = tokens[i+1]
            i += 2
        else:
            out_tokens.append(t)
            i += 1
    return out_tokens, redir

# ─────────────────────────────────────────────
#  REDIRECT WRITE HELPER
# ─────────────────────────────────────────────
def _write_redirect(text, redir):
    if not redir["stdout"]:
        return False
    parts = _resolve_path(redir["stdout"])
    parent, name = _get_parent_and_name(parts)
    if parent is None:
        _out(f"bash: {redir['stdout']}: No such file or directory", "err")
        return True
    if name not in parent["children"]:
        parent["children"][name] = make_file("", owner=STATE["user"])
    node = parent["children"][name]
    if redir["stdout_append"]:
        node["content"] += text
    else:
        node["content"] = text
    node["mtime"] = _now()
    return True

# ─────────────────────────────────────────────
#  COMMAND IMPLEMENTATIONS
# ─────────────────────────────────────────────
def cmd_ls(args, redir):
    long_fmt = False
    all_files = False
    almost_all = False
    classify = False
    reverse = False
    sort_time = False
    human = False
    recursive = False
    paths = []
    i = 0
    while i < len(args):
        a = args[i]
        if a.startswith("-") and len(a) > 1 and not a.startswith("--"):
            for c in a[1:]:
                if c == "l": long_fmt = True
                elif c == "a": all_files = True
                elif c == "A": almost_all = True
                elif c == "F": classify = True
                elif c == "r": reverse = True
                elif c == "t": sort_time = True
                elif c == "h": human = True
                elif c == "R": recursive = True
        elif a == "--all": all_files = True
        elif a == "--classify": classify = True
        else: paths.append(a)
        i += 1

    if not paths:
        paths = [None]

    lines = []
    for path in paths:
        if path is None:
            node = _get_node(STATE["cwd"])
            pstr = _path_str()
        else:
            parts = _resolve_path(path)
            node = _get_node(parts)
            pstr = _path_str(parts)

        if node is None:
            lines.append(("err", f"ls: cannot access '{path}': No such file or directory"))
            continue

        if node["type"] == "file":
            if long_fmt:
                lines.append(("plain", f"{_fmt_mode(node)} 1 {node['owner']:8} {node['group']:8} {_fmt_size(node):8} {_fmt_time(node['mtime'])} {pstr.split('/')[-1]}"))
            else:
                lines.append(("plain", pstr.split("/")[-1]))
            continue

        if len(paths) > 1:
            lines.append(("plain", f"{pstr}:"))

        children = node["children"]
        entries = sorted(children.keys(), key=lambda x: x.lower())
        if reverse:
            entries = entries[::-1]
        if sort_time:
            entries = sorted(entries, key=lambda x: -children[x]["mtime"])

        if long_fmt:
            total_blocks = sum(int(_fmt_size(children[e])) for e in entries if not e.startswith(".") or all_files or almost_all)
            lines.append(("plain", f"total {total_blocks//1024 or 1}"))
            if all_files:
                # . and ..
                lines.append(("plain", f"{_fmt_mode(node)} 2 {node['owner']:8} {node['group']:8} {'4096':8} {_fmt_time(node['mtime'])} ."))
                lines.append(("plain", f"{_fmt_mode(node)} 2 {node['owner']:8} {node['group']:8} {'4096':8} {_fmt_time(node['mtime'])} .."))
            for e in entries:
                if e.startswith(".") and not all_files and not almost_all:
                    continue
                ch = children[e]
                name = e
                if ch["type"] == "link":
                    name += f" -> {ch['target']}"
                    cls = "link"
                elif ch["type"] == "dir":
                    cls = "dir"
                elif ch["mode"] & 0o111:
                    cls = "exec"
                else:
                    cls = "plain"
                nlinks = 2 if ch["type"] == "dir" else 1
                lines.append((cls, f"{_fmt_mode(ch)} {nlinks} {ch['owner']:8} {ch['group']:8} {_fmt_size(ch):8} {_fmt_time(ch['mtime'])} {name}"))
        else:
            row = []
            for e in entries:
                if e.startswith(".") and not all_files and not almost_all:
                    continue
                ch = children[e]
                suffix = ""
                if classify:
                    if ch["type"] == "dir": suffix = "/"
                    elif ch["type"] == "link": suffix = "@"
                    elif ch["mode"] & 0o111: suffix = "*"
                if ch["type"] == "dir":
                    row.append(("dir", e + suffix))
                elif ch["type"] == "link":
                    row.append(("link", e + suffix))
                elif ch["mode"] & 0o111:
                    row.append(("exec", e + suffix))
                else:
                    row.append(("plain", e + suffix))
            # arrange in columns
            if row:
                max_w = max(len(r[1]) for r in row) + 2
                cols = max(1, 80 // max_w)
                for i2 in range(0, len(row), cols):
                    chunk = row[i2:i2+cols]
                    line_html = ""
                    for (cls, nm) in chunk:
                        padded = nm.ljust(max_w)
                        if cls == "dir":
                            line_html += f'<span class="line-dir">{_esc(padded)}</span>'
                        elif cls == "exec":
                            line_html += f'<span class="line-exec">{_esc(padded)}</span>'
                        elif cls == "link":
                            line_html += f'<span class="line-link">{_esc(padded)}</span>'
                        else:
                            line_html += _esc(padded)
                    lines.append(("raw_html", line_html))

        if recursive:
            for e in entries:
                if e.startswith("."):
                    continue
                ch = children[e]
                if ch["type"] == "dir":
                    sub_path = (pstr.rstrip("/") + "/" + e) if path else (pstr.rstrip("/") + "/" + e)
                    cmd_ls(["-R", sub_path] + (["-l"] if long_fmt else []), redir)

    out_text = ""
    for item in lines:
        if item[0] == "raw_html":
            _out_raw(item[1] + "\n")
        elif item[0] == "plain":
            out = item[1] + "\n"
            if _write_redirect(out, redir): pass
            else: _out_raw(_esc(out))
        elif item[0] == "err":
            _out(item[1], "err")
        else:
            cls = item[0]
            out = item[1] + "\n"
            if redir["stdout"]:
                _write_redirect(out, redir)
            else:
                _out_raw(f'<span class="line-{cls}">{_esc(item[1])}</span>\n')

def cmd_rm(args, redir):
    recursive = False
    force = False
    verbose = False
    paths = []
    for a in args:
        if a in ("-r","-R","--recursive"): recursive = True
        elif a in ("-f","--force"): force = True
        elif a in ("-rf","-fr","-Rf"): recursive = True; force = True
        elif a in ("-v","--verbose"): verbose = True
        elif not a.startswith("-"): paths.append(a)
        else:
            for c in a[1:]:
                if c == "r" or c == "R": recursive = True
                elif c == "f": force = True
                elif c == "v": verbose = True
    for path in paths:
        parts = _resolve_path(path)
        parent, name = _get_parent_and_name(parts)
        if parent is None or name not in parent["children"]:
            if not force:
                _out(f"rm: cannot remove '{path}': No such file or directory", "err")
            continue
        node = parent["children"][name]
        if node["type"] == "dir" and not recursive:
            _out(f"rm: cannot remove '{path}': Is a directory", "err")
            continue
        if verbose:
            _out(f"removed '{path}'")
        del parent["children"][name]

def cmd_cp(args, redir):
    recursive = False
    paths = []
    for a in args:
        if a in ("-r","-R","--recursive"): recursive = True
        elif not a.startswith("-"): paths.append(a)
    if len(paths) < 2:
        _out("cp: missing destination file operand", "err")
        return
    dest = paths[-1]
    srcs = paths[:-1]
    import copy
    dest_parts = _resolve_path(dest)
    dest_node = _get_node(dest_parts)
    for src in srcs:
        src_parts = _resolve_path(src)
        src_node = _get_node(src_parts)
        if src_node is None:
            _out(f"cp: cannot stat '{src}': No such file or directory", "err")
            continue
        if src_node["type"] == "dir" and not recursive:
            _out(f"cp: -r not specified; omitting directory '{src}'", "err")
            continue
        if dest_node and dest_node["type"] == "dir":
            name = src_parts[-1]
            dest_node["children"][name] = copy.deepcopy(src_node)
        else:
            parent, name = _get_parent_and_name(dest_parts)
            if parent is None:
                _out(f"cp: cannot create '{dest}': No such file or directory", "err")
                continue
            parent["children"][name] = copy.deepcopy(src_node)

def cmd_mv(args, redir):

        _out("mv: missing destination file operand", "err")
        return
    dest = paths[-1]
    srcs = paths[:-1]
    dest_parts = _resolve_path(dest)
    dest_node = _get_node(dest_parts)
    for src in srcs:
        src_parts = _resolve_path(src)
        src_parent, src_name = _get_parent_and_name(src_parts)
        if src_parent is None or src_name not in src_parent["children"]:
            _out(f"mv: cannot stat '{src}': No such file or directory", "err")
            continue
        src_node = src_parent["children"][src_name]
        if dest_node and dest_node["type"] == "dir":
            dest_node["children"][src_name] = src_node
        else:
            d_parent, d_name = _get_parent_and_name(dest_parts)
            if d_parent is None:
                _out(f"mv: cannot move '{src}' to '{dest}': No such file or directory", "err")
                continue
            d_parent["children"][d_name] = src_node
        del src_parent["children"][src_name]

def cmd_find(args, redir):
    path = "."
    name_pat = None
    type_filter = None
    maxdepth = 999
    i = 0
    while i < len(args):
        a = args[i]
        if a == "-name" and i+1 < len(args):
            name_pat = args[i+1]; i += 2
        elif a == "-type" and i+1 < len(args):
            type_filter = args[i+1]; i += 2
        elif a == "-maxdepth" and i+1 < len(args):
            maxdepth = int(args[i+1]); i += 2
        elif not a.startswith("-"):
            path = a; i += 1
        else:
            i += 1

    def _match(name, pat):
        if pat is None:
            return True
        # simple glob: * and ?
        import re
        regex = "^" + re.escape(pat).replace(r"\*",".*").replace(r"\?",".") + "$"
        return bool(re.match(regex, name))

    def _walk(node, current_path, depth):
        if depth > maxdepth:
            return
        if node["type"] == "dir":
            for nm, child in sorted(node["children"].items()):
                cp = current_path + "/" + nm
                type_ok = (type_filter is None or
                    (type_filter == "f" and child["type"] == "file") or
                    (type_filter == "d" and child["type"] == "dir") or
                    (type_filter == "l" and child["type"] == "link"))
                name_ok = _match(nm, name_pat)
                if type_ok and name_ok:
                    out_text = cp + "\n"
                    if not _write_redirect(out_text, redir):
                        _out(cp)
                _walk(child, cp, depth+1)

    base_parts = _resolve_path(path)
    base_node = _get_node(base_parts)
    if base_node is None:
        _out(f"find: '{path}': No such file or directory", "err")
        return
    base_path = _path_str(base_parts)
    type_ok = (type_filter is None or
        (type_filter == "d" and base_node["type"] == "dir") or
        (type_filter == "f" and base_node["type"] == "file"))
    if type_ok and _match(base_path.split("/")[-1] or "/", name_pat):
        if not _write_redirect(base_path + "\n", redir):
            _out(base_path)
    _walk(base_node, base_path, 1)

def cmd_grep(args, redir):
    ignore_case = False
    recursive = False
    line_num = False
    invert = False
    count = False
    quiet = False
    word = False
    pattern = None
    files = []
    i = 0
    while i < len(args):
        a = args[i]
        if a in ("-i","--ignore-case"): ignore_case = True
        elif a in ("-r","-R","--recursive"): recursive = True
        elif a in ("-n","--line-number"): line_num = True
        elif a in ("-v","--invert-match"): invert = True
        elif a in ("-c","--count"): count = True
        elif a in ("-q","--quiet"): quiet = True
        elif a in ("-w","--word-regexp"): word = True
        elif a in ("-l","--files-with-matches"): pass
        elif not a.startswith("-"):
            if pattern is None: pattern = a
            else: files.append(a)
        i += 1

    if pattern is None:
        _out("grep: no pattern specified", "err")
        return

    flags = re.IGNORECASE if ignore_case else 0
    if word:
        pattern = r"\b" + pattern + r"\b"
    try:
        regex = re.compile(pattern, flags)
    except:
        _out(f"grep: invalid regex: {pattern}", "err")
        return

    def _grep_content(content, fname=""):
        matches = 0
        output = []
        for idx, line in enumerate(content.split("\n"), 1):
            matched = bool(regex.search(line))
            if invert:
                matched = not matched
            if matched:
                matches += 1
                if not quiet and not count:
                    prefix = ""
                    if fname: prefix += fname + ":"
                    if line_num: prefix += str(idx) + ":"
                    output.append(prefix + line)
        if count:
            prefix = fname + ":" if fname else ""
            output.append(prefix + str(matches))
        return output

    def _grep_node(node, path_str):
        results = []
        if node["type"] == "file":
            results = _grep_content(node["content"], path_str if files else "")
        elif node["type"] == "dir" and recursive:
            for nm, ch in sorted(node["children"].items()):
                results.extend(_grep_node(ch, path_str + "/" + nm))
        return results

    all_results = []
    if not files:
        _out("grep: (stdin not supported, provide a filename)", "warn")
        return
    for f in files:
        parts = _resolve_path(f)
        node = _get_node(parts)
        if node is None:
            _out(f"grep: {f}: No such file or directory", "err")
            continue
        all_results.extend(_grep_node(node, f))

    out_text = "\n".join(all_results) + ("\n" if all_results else "")
    if not _write_redirect(out_text, redir):
        for line in all_results:
            # highlight match
            try:
                hl = regex.sub(lambda m: f'<span style="color:#f85149;font-weight:bold">{_esc(m.group())}</span>', _esc(line))
                _out_raw(hl + "\n")
            except:
                _out(line)

        content = node["content"]
        lines = content.count("\n")
        words = len(content.split())
        chars = len(content)
        total_l += lines; total_w += words; total_c += chars

        results.append(" ".join(parts_str) + " total")

    if not _write_redirect(out_text, redir):

        lines = lines[:-1]

        seen = set()
        lines = [l for l in lines if not (l in seen or seen.add(l))]

    if not _write_redirect(out_text, redir):
        for l in lines: _out(l)

def cmd_cut(args, redir):
    delimiter = "\t"
    fields = None
    chars = None
    files = []
    i = 0
    while i < len(args):
        a = args[i]
        if a.startswith("-d"):
            delimiter = a[2:] if len(a) > 2 else (args[i+1] if i+1 < len(args) else "\t")
            if len(a) <= 2 and i+1 < len(args): i += 1
        elif a.startswith("-f"):
            fields = a[2:] if len(a) > 2 else (args[i+1] if i+1 < len(args) else "1")
            if len(a) <= 2 and i+1 < len(args): i += 1
        elif a.startswith("-c"):
            chars = a[2:] if len(a) > 2 else (args[i+1] if i+1 < len(args) else "1")
            if len(a) <= 2 and i+1 < len(args): i += 1
        elif not a.startswith("-"):
            files.append(a)
        i += 1
    def parse_range(spec):
        idxs = set()
        for part in spec.split(","):
            if "-" in part:
                a2, b2 = part.split("-",1)
                lo = int(a2)-1 if a2 else 0
                hi = int(b2)-1 if b2 else 999
                idxs.update(range(lo, hi+1))
            else:
                idxs.add(int(part)-1)
        return sorted(idxs)
    content = ""
    for f in files:
        node = _get_node(_resolve_path(f))
        if node: content += node["content"]
    out_text = ""
    for line in content.split("\n"):
        if fields:
            parts2 = line.split(delimiter)
            idxs = parse_range(fields)
            out_text += delimiter.join(parts2[i2] for i2 in idxs if i2 < len(parts2)) + "\n"
        elif chars:
            idxs = parse_range(chars)
            out_text += "".join(line[i2] for i2 in idxs if i2 < len(line)) + "\n"
        else:
            out_text += line + "\n"
    if not _write_redirect(out_text, redir):
        for l in out_text.rstrip("\n").split("\n"): _out(l)

def cmd_chmod(args, redir):
    recursive = "-R" in args or "-r" in args
    args = [a for a in args if a not in ("-R","-r","-v")]
    if len(args) < 2:
        _out("chmod: missing operand", "err"); return
    mode_str = args[0]
    files = args[1:]
    def parse_mode(s, old_mode):
        # symbolic: u+x, g-w, o=r, a+rwx, or octal
        if re.match(r'^[0-7]+$', s):
            return int(s, 8)
        m = old_mode
        for part in re.findall(r'[ugoa]*[+\-=][rwxXst]*', s):
            who_str = re.match(r'([ugoa]*)', part).group(1) or "a"
            op = re.search(r'[+\-=]', part).group()
            perm_str = re.search(r'[+\-=](.*)', part).group(1)
            perm_bits = 0
            if "r" in perm_str: perm_bits |= 4
            if "w" in perm_str: perm_bits |= 2
            if "x" in perm_str or "X" in perm_str: perm_bits |= 1
            shifts = []
            if "u" in who_str or "a" in who_str: shifts.append(6)
            if "g" in who_str or "a" in who_str: shifts.append(3)
            if "o" in who_str or "a" in who_str: shifts.append(0)
            for sh in shifts:
                if op == "+": m |= perm_bits << sh
                elif op == "-": m &= ~(perm_bits << sh)
                elif op == "=":
                    m &= ~(7 << sh)
                    m |= perm_bits << sh
        return m
    def _apply(path, nm):
        node = _get_node(_resolve_path(path))
        if node is None:
            _out(f"chmod: cannot access '{path}': No such file or directory", "err"); return
        node["mode"] = parse_mode(mode_str, node["mode"])
        if recursive and node["type"] == "dir":
            for child in node["children"]:
                _apply(path.rstrip("/") + "/" + child, child)
    for f in files:
        _apply(f, f.split("/")[-1])

def cmd_chown(args, redir):
    args = [a for a in args if a not in ("-R","-r")]
    if len(args) < 2:
        _out("chown: missing operand", "err"); return
    owner = args[0]
    for f in args[1:]:
        node = _get_node(_resolve_path(f))
        if node is None:
            _out(f"chown: cannot access '{f}': No such file or directory", "err"); continue
        if ":" in owner:
            o, g = owner.split(":",1)
            if o: node["owner"] = o
            if g: node["group"] = g
        else:
            node["owner"] = owner

def cmd_ln(args, redir):

    if len(args) < 2:
        _out("ln: missing operand", "err"); return
    target = args[0]; link_name = args[1]
    parts = _resolve_path(link_name)
    parent, name = _get_parent_and_name(parts)
    if parent is None:
        _out(f"ln: cannot create link '{link_name}': No such file or directory", "err"); return
    if symbolic:
        parent["children"][name] = make_link(target, owner=STATE["user"])
    else:
        src = _get_node(_resolve_path(target))
        if src is None:
            _out(f"ln: cannot access '{target}': No such file or directory", "err"); return
        import copy
        parent["children"][name] = copy.deepcopy(src)

def cmd_du(args, redir):
    h_flag = "-h" in args
    s_flag = "-s" in args
    paths = [a for a in args if not a.startswith("-")]
    if not paths: paths = ["."]
    def _du_node(node, path):
        if node["type"] == "file":
            return len(node["content"])
        elif node["type"] == "dir":
            return sum(_du_node(ch, path+"/"+nm) for nm, ch in node["children"].items()) + 4096
        return 0
    for path in paths:
        parts = _resolve_path(path)
        node = _get_node(parts)
        if node is None:
            _out(f"du: cannot access '{path}': No such file or directory", "err"); continue
        if s_flag:
            sz = _du_node(node, path)
            display = (f"{sz//1024}K" if h_flag else str(sz//1024)) + f"\t{path}"
            if not _write_redirect(display+"\n", redir): _out(display)
        else:
            def _walk_du(nd, p, depth=0):
                sz = _du_node(nd, p)
                display = (f"{sz//1024}K" if h_flag else str(sz//1024)) + f"\t{p}"
                if not _write_redirect(display+"\n", redir): _out(display)
                if nd["type"] == "dir":
                    for nm, ch in sorted(nd["children"].items()):
                        _walk_du(ch, p+"/"+nm, depth+1)
            _walk_du(node, path)

def cmd_cal(args, redir):
    import time as t
    lt = t.localtime()
    year = lt.tm_year
    month = lt.tm_mon
    if args:
        try:
            if len(args) == 1: month = int(args[0])
            elif len(args) == 2: month = int(args[0]); year = int(args[1])
        except: pass
    months = ["","January","February","March","April","May","June",
              "July","August","September","October","November","December"]
    header = f"   {months[month]} {year}"
    _out(header.center(20))
    _out("Su Mo Tu We Th Fr Sa")
    # get first day of month
    import time as tm
    first_ts = tm.mktime((year, month, 1, 0, 0, 0, 0, 0, -1))
    first_day = tm.localtime(first_ts).tm_wday  # 0=Mon
    first_day = (first_day + 1) % 7  # 0=Sun
    days_in = [0,31,28,31,30,31,30,31,31,30,31,30,31]
    if (year%4==0 and year%100!=0) or year%400==0: days_in[2]=29
    row = "   " * first_day
    for d in range(1, days_in[month]+1):
        row += f"{d:2} "
        if (first_day + d) % 7 == 0:
            _out(row.rstrip())
            row = ""
    if row.strip(): _out(row.rstrip())

def cmd_diff(args, redir):
    files = [a for a in args if not a.startswith("-")]
    if len(files) < 2:
        _out("diff: missing operand", "err"); return
    n1, n2 = files[0], files[1]
    a = _get_node(_resolve_path(n1))
    b = _get_node(_resolve_path(n2))
    if not a:
        _out(f"diff: {n1}: No such file or directory", "err"); return
    if not b:
        _out(f"diff: {n2}: No such file or directory", "err"); return
    la = a["content"].split("\n")
    lb = b["content"].split("\n")
    # simple line-by-line diff
    found = False
    for i, (al, bl) in enumerate(zip(la, lb)):
        if al != bl:
            _out(f"{i+1}c{i+1}")
            _out(f"< {al}", "err")
            _out("---")
            _out(f"> {bl}", "ok")
            found = True
    if len(la) != len(lb):
        found = True
        if len(la) > len(lb):
            for i in range(len(lb), len(la)):
                _out(f"{i+1}d{len(lb)}")
                _out(f"< {la[i]}", "err")
        else:
            for i in range(len(la), len(lb)):
                _out(f"{len(la)}a{i+1}")
                _out(f"> {lb[i]}", "ok")
    if not found:
        pass  # files identical

def cmd_sed(args, redir):
    # basic sed s/a/b/g on file
    expr = None
    files = []
    i = 0
    while i < len(args):
        a = args[i]
        if a in ("-e","-n") and i+1 < len(args):
            if a == "-e": expr = args[i+1]
            i += 2
        elif not a.startswith("-"):
            if expr is None: expr = a
            else: files.append(a)
            i += 1
        else:
            i += 1
    if not expr:
        _out("sed: no script command", "err"); return
    m = re.match(r'^s/(.+)/(.+)/([gi]*)$', expr)
    if not m:
        _out(f"sed: unsupported expression: {expr}", "warn"); return
    pat, repl, flags = m.group(1), m.group(2), m.group(3)
    re_flags = re.IGNORECASE if "i" in flags else 0
    for f in files:
        node = _get_node(_resolve_path(f))
        if node is None:
            _out(f"sed: {f}: No such file or directory", "err"); continue
        count = 0 if "g" in flags else 1
        new_content, _ = re.subn(pat, repl, node["content"], count=count, flags=re_flags)
        out_text = new_content
        if not _write_redirect(out_text, redir):
            for l in out_text.rstrip("\n").split("\n"): _out(l)

def cmd_test(args, redir):
    # basic test: -f, -d, -e, -z, -n, string comparison
    expr = [a for a in args if a != "[" and a != "]"]
    if len(expr) == 2 and expr[0].startswith("-"):
        flag = expr[0]
        path = expr[1]
        node = _get_node(_resolve_path(path))
        if flag == "-e": STATE["env"]["?"] = "0" if node else "1"
        elif flag == "-f": STATE["env"]["?"] = "0" if node and node["type"]=="file" else "1"
        elif flag == "-d": STATE["env"]["?"] = "0" if node and node["type"]=="dir" else "1"
        elif flag == "-z": STATE["env"]["?"] = "0" if not path else "1"
        elif flag == "-n": STATE["env"]["?"] = "0" if path else "1"
        else: STATE["env"]["?"] = "1"
    elif len(expr) == 3:
        a2, op, b2 = expr
        if op == "==" or op == "=": STATE["env"]["?"] = "0" if a2 == b2 else "1"
        elif op == "!=": STATE["env"]["?"] = "0" if a2 != b2 else "1"
        elif op == "-eq": STATE["env"]["?"] = "0" if a2 == b2 else "1"
        elif op == "-ne": STATE["env"]["?"] = "0" if a2 != b2 else "1"
        elif op == "-lt": 
            try: STATE["env"]["?"] = "0" if int(a2) < int(b2) else "1"
            except: STATE["env"]["?"] = "1"
        elif op == "-gt":
            try: STATE["env"]["?"] = "0" if int(a2) > int(b2) else "1"
            except: STATE["env"]["?"] = "1"

def _show_vi():

    content = STATE["editor_content"]

    lines = content.split("\n")
    for i, line in enumerate(lines, 1):

    for _ in range(max(0, 20 - len(lines))):

    mode_str = "-- INSERT --" if mode == "insert" else ""
    _out_raw(f'<span class="line-info">{_esc(path)}</span>'
             f'  {len(lines)}L, {len(content)}C\n')
    if mode_str:
        _out_raw(f'<span class="line-ok">{mode_str}</span>\n')
    _out_raw('<span class="line-warn">Commands: i=insert mode, Esc=command mode, :w save, :q quit, :wq save+quit, :q! force quit</span>\n')
    document["prompt-label"].text = "vi> " if mode == "command" else "vi-INSERT> "

def _handle_editor_input(line):
    mode = STATE["editor_mode"]
    if mode == "nano":
        if line in (":exit", ":q", ":q!"):
            _exit_editor(save=False)
        elif line in (":save", ":w", ":wq", ":x"):
            _exit_editor(save=True)
            if line in (":wq", ":x"):
                pass
        elif line == ":q!":
            _exit_editor(save=False)
        else:
            # Append text line
            if STATE["editor_content"] and not STATE["editor_content"].endswith("\n"):
                STATE["editor_content"] += "\n"
            STATE["editor_content"] += line + "\n"
            _show_nano()
    elif mode == "vi":
        vi_mode = STATE["vi_mode"]
        if vi_mode == "command":
            if line in (":q", ":q!"):
                _exit_editor(save=False)
            elif line in (":w",):
                _save_editor()
                _show_vi()
            elif line in (":wq", ":x", ":ZZ"):
                _exit_editor(save=True)
            elif line == "i" or line == "a" or line == "o":
                STATE["vi_mode"] = "insert"
                _show_vi()
            elif line == "dd":
                lines = STATE["editor_content"].split("\n")
                if lines: lines.pop(0)
                STATE["editor_content"] = "\n".join(lines)
                _show_vi()
            elif line.startswith(":%s/"):
                # basic substitute
                m = re.match(r'^:%s/(.+)/(.+)/([g]*)$', line)
                if m:
                    pat, repl, flags = m.group(1), m.group(2), m.group(3)
                    count = 0 if "g" in flags else 1
                    STATE["editor_content"] = re.sub(pat, repl, STATE["editor_content"], count=count)
                _show_vi()
            else:
                _show_vi()
        else:  # insert mode
            if line == "\x1b" or line == "Esc":
                STATE["vi_mode"] = "command"
            else:
                if STATE["editor_content"] and not STATE["editor_content"].endswith("\n"):
                    STATE["editor_content"] += "\n"
                STATE["editor_content"] += line + "\n"
            _show_vi()

def _save_editor():
    path = STATE["editor_file"]
    content = STATE["editor_content"]
    parts = _resolve_path(path)
    parent, name = _get_parent_and_name(parts)
    if parent is not None:
        if name in parent["children"]:
            parent["children"][name]["content"] = content
            parent["children"][name]["mtime"] = _now()
        else:
            parent["children"][name] = make_file(content, owner=STATE["user"])

def _exit_editor(save=True):
    if save:
        _save_editor()
        _out(f"Saved '{STATE['editor_file']}'", "ok")
    else:
        _out("Discarded changes.", "warn")
    STATE["editor_mode"] = None
    STATE["editor_file"] = None
    STATE["editor_content"] = None
    STATE["vi_mode"] = "command"
    _update_prompt()

def _run_command(line):
    """Execute a single command line."""
    line = line.strip()
    if not line or line.startswith("#"):
        return

    # Handle VAR=value assignment
    if re.match(r'^[A-Za-z_][A-Za-z0-9_]*=', line) and " " not in line.split("=")[0]:
        k, v = line.split("=", 1)
        STATE["env"][k] = _expand_vars(v.strip("'\""))
        return

    # Handle pipes (limited)
    if "|" in line:
        parts = line.split("|")
        if len(parts) == 2:
            left = parts[0].strip()
            right = parts[1].strip()
            # Capture left output
            import io
            captured = []
            old_out = document["output"].html
            document["output"].html = ""
            _run_command(left)
            captured_html = document["output"].html
            document["output"].html = old_out
            # Extract text from HTML (strip tags)
            text = re.sub(r'<[^>]+>', '', captured_html).replace("&lt;","<").replace("&gt;",">").replace("&amp;","&")
            # Write to temp file and run right with it
            tmp_name = "__pipe_tmp__"
            node = FS["children"]["tmp"]
            node["children"][tmp_name] = make_file(text)
            r_tokens = _tokenize(right)
            r_tokens, r_redir = _parse_redirects(r_tokens)
            if r_tokens:
                cmd = r_tokens[0]
                cmd_args = r_tokens[1:] + [f"/tmp/{tmp_name}"]
                if cmd in COMMANDS:
                    COMMANDS[cmd](cmd_args, r_redir)
                else:
                    _run_command(right + f" /tmp/{tmp_name}")
            del node["children"][tmp_name]
        else:
            _out("pipes with more than 2 stages not fully supported", "warn")
        return

    # Handle ; sequences
    if ";" in line:
        for sub in line.split(";"):
            _run_command(sub.strip())
        return

    # Handle && 
    if "&&" in line:
        parts = line.split("&&", 1)
        _run_command(parts[0].strip())
        if STATE["env"].get("?", "0") == "0":
            _run_command(parts[1].strip())
        return

    # Handle ||
    if "||" in line:
        parts = line.split("||", 1)
        _run_command(parts[0].strip())
        if STATE["env"].get("?", "0") != "0":
            _run_command(parts[1].strip())
        return

    # Tokenize
    tokens = _tokenize(line)
    if not tokens:
        return
    tokens, redir = _parse_redirects(tokens)
    if not tokens:
        return

    cmd = tokens[0]
    args = tokens[1:]

    # Check aliases
    if cmd in STATE["aliases"] and not line.startswith("\\"):
        expanded = STATE["aliases"][cmd]
        new_line = expanded + (" " + " ".join(args) if args else "")
        _run_command(new_line)
        return

    if cmd in COMMANDS:
        COMMANDS[cmd](args, redir)
    else:
        # Check if it's an executable file in PATH
        found = False
        for bin_dir in ["/usr/bin","/usr/local/bin","/bin","/sbin","/usr/sbin"]:
            parts = _resolve_path(bin_dir + "/" + cmd)
            node = _get_node(parts)
            if node and node["type"] in ("file","link"):
                found = True
                if node["content"].startswith("#!"):
                    interp_line = node["content"].split("\n")[0][2:].strip()
                    _run_command(f"{interp_line} {bin_dir}/{cmd} {' '.join(args)}")
                else:
                    _out(f"{bin_dir}/{cmd}: Exec format error", "err")
                break
        if not found:
            _out(f"bash: {cmd}: command not found", "err")
        STATE["env"]["?"] = "1" if not found else "0"

# ─────────────────────────────────────────────
#  BOOT SEQUENCE
# ─────────────────────────────────────────────
def _boot():
    _out("Linux Emulator — Brython Python Shell", "info")
    _out("Kernel: Linux 6.1.0-emulated #1 SMP x86_64", "info")
    _out("")
    # show motd
    motd = _get_node(["etc","motd"])
    if motd:
        for line in motd["content"].strip().split("\n"):
            _out(line, "ok")
    _out("")
    _update_prompt()

# ─────────────────────────────────────────────
#  INPUT HANDLER
# ─────────────────────────────────────────────
def on_keydown(event):
    inp = document["cmd-input"]
    key = event.key

    if STATE["editor_mode"]:
        if key == "Enter":
            val = inp.value
            inp.value = ""
            _handle_editor_input(val)
        return

    if key == "Enter":
        line = inp.value.strip()
        inp.value = ""
        if line:
            STATE["history"].append(line)
            STATE["hist_idx"] = -1
        _echo_cmd(line)
        if line:
            _run_command(line)
        _update_prompt()

    elif key == "ArrowUp":
        event.preventDefault()
        hist = STATE["history"]
        if not hist:
            return
        if STATE["hist_idx"] == -1:
            STATE["hist_idx"] = len(hist) - 1
        elif STATE["hist_idx"] > 0:
            STATE["hist_idx"] -= 1
        inp.value = hist[STATE["hist_idx"]]
        # Move cursor to end
        def _end(ev=None):
            inp.selectionStart = inp.selectionEnd = len(inp.value)
        window.setTimeout(_end, 0)

    elif key == "ArrowDown":
        event.preventDefault()
        hist = STATE["history"]
        if STATE["hist_idx"] == -1:
            return
        if STATE["hist_idx"] < len(hist) - 1:
            STATE["hist_idx"] += 1
            inp.value = hist[STATE["hist_idx"]]
        else:
            STATE["hist_idx"] = -1
            inp.value = ""

    elif key == "Tab":
        event.preventDefault()
        line = inp.value
        tokens = _tokenize(line)
        if not tokens:
            return
        # Tab complete the last token
        last = tokens[-1] if tokens else ""
        is_cmd = len(tokens) == 1 and not line.endswith(" ")

        if "/" in last:
            # path completion
            slash_idx = last.rfind("/")
            dir_part = last[:slash_idx] or "/"
            file_part = last[slash_idx+1:]
            dir_parts = _resolve_path(dir_part)
            dir_node = _get_node(dir_parts)
            if dir_node and dir_node["type"] == "dir":
                matches = [k for k in dir_node["children"] if k.startswith(file_part)]
        elif is_cmd:
            matches = [k for k in COMMANDS if k.startswith(last)]
            matches += [k for k in STATE["aliases"] if k.startswith(last)]
        else:
            # file completion in cwd
            cwd_node = _get_node(STATE["cwd"])
            matches = [k for k in cwd_node["children"] if k.startswith(last)] if cwd_node else []

        if len(matches) == 1:
            m = matches[0]
            if "/" in last:
                slash_idx = last.rfind("/")
                base = last[:slash_idx+1]
                inp.value = " ".join(tokens[:-1] + [base + m])
            else:
                inp.value = " ".join(tokens[:-1] + [m])
            # add trailing space if command
            if is_cmd:
                inp.value += " "
        elif len(matches) > 1:
            _echo_cmd(inp.value)
            _out("  ".join(sorted(matches)))

    elif key == "l" and event.ctrlKey:
        event.preventDefault()
        cmd_clear([], {})

    elif key == "c" and event.ctrlKey:
        event.preventDefault()
        _echo_cmd(inp.value + "^C")
        inp.value = ""
        STATE["editor_mode"] = None
        _update_prompt()

    elif key == "d" and event.ctrlKey:
        if not inp.value:
            event.preventDefault()
            _echo_cmd("exit")
            cmd_exit([], {})

document["cmd-input"].bind("keydown", on_keydown)

# Focus input on click anywhere
def _focus_input(ev):
    document["cmd-input"].focus()
document["terminal"].bind("click", _focus_input)

_boot()
